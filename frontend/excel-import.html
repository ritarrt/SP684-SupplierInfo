<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Import ดีลราคา</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { 
      background-color: #f5f5f5; 
      font-family: 'Sarabun', sans-serif; 
      color: #333; 
    }
    .upload-dropzone {
      border: 2px dashed #cbd5e1;
      border-radius: 10px;
      background-color: #f8fafc;
      transition: all 0.3s;
      cursor: pointer;
      text-align: center;
      padding: 40px 20px;
    }
    .upload-dropzone.dragover {
      border-color: #3b82f6;
      background-color: #eff6ff;
    }
    .table-container {
      overflow-x: auto;
    }
    table {
      border-collapse: collapse;
    }
    th {
      background-color: #f1f5f9;
      font-weight: 600;
      padding: 12px;
      text-align: left;
      border-bottom: 2px solid #e2e8f0;
    }
    td {
      padding: 12px;
      border-bottom: 1px solid #e2e8f0;
    }
    tr:hover {
      background-color: #f8fafc;
    }
    .tab-button {
      padding: 10px 16px;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.3s;
      white-space: nowrap;
    }
    .tab-button:hover {
      background-color: #f1f5f9;
    }
    .tab-button.active {
      border-bottom-color: #3b82f6;
      color: #3b82f6;
    }
  </style>
</head>

<body class="bg-gray-100">

  <!-- HEADER -->
  <header class="w-full h-16 bg-stone-900 flex items-center px-4">
    <div class="text-white font-bold text-lg">Import ดีลราคา</div>
  </header>

  <!-- CONTENT -->
  <main class="w-full bg-white mt-6 rounded shadow p-6">

    <h1 class="text-2xl font-bold mb-6">นำเข้าดีลราคาจากไฟล์ Excel</h1>

    <!-- PRODUCT TYPE TABS -->
    <div id="productTypeTabs" class="mb-6 border-b border-gray-200 flex gap-2 overflow-x-auto">
      <!-- Tabs will be created here -->
    </div>

    <!-- UPLOAD SECTION -->
    <div class="mb-8">
      <h2 class="text-lg font-semibold mb-4">1. อัปโหลดไฟล์ Excel</h2>
      
      <div class="upload-dropzone" id="dropzone">
        <div class="mb-3">
          <i class="bi bi-cloud-arrow-up text-4xl text-gray-400"></i>
        </div>
        <p class="text-gray-600 mb-2">ลากไฟล์มาที่นี่ หรือคลิกเพื่อเลือก</p>
        <p class="text-sm text-gray-400">รองรับไฟล์ .xlsx, .xls, .csv</p>
        <input 
          type="file" 
          id="fileInput" 
          accept=".xlsx,.xls,.csv" 
          class="hidden"
        />
      </div>

      <div id="fileInfo" class="mt-4 hidden">
        <div class="flex items-center gap-2 text-green-600">
          <i class="bi bi-check-circle"></i>
          <span id="fileName"></span>
        </div>
      </div>
    </div>

    <!-- SHEET SELECTION -->
    <div id="sheetSection" class="mb-8 hidden">
      <h2 class="text-lg font-semibold mb-4">2. เลือก Sheet</h2>
      <div id="sheetButtons" class="flex gap-2 flex-wrap"></div>
    </div>

    <!-- DATA PREVIEW -->
    <div id="dataSection" class="mb-8 hidden">
      <h2 class="text-lg font-semibold mb-4">3. ตรวจสอบข้อมูล</h2>
      
      <div class="mb-4 flex gap-2">
        <button 
          id="importBtn" 
          class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 flex items-center gap-2"
        >
          <i class="bi bi-download"></i>
          นำเข้าข้อมูล
        </button>
        <button 
          id="clearBtn" 
          class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500 flex items-center gap-2"
        >
          <i class="bi bi-x-circle"></i>
          ล้างข้อมูล
        </button>
      </div>

      <div class="table-container border rounded">
        <table id="dataTable" class="w-full text-sm">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>

      <div id="rowCount" class="mt-4 text-sm text-gray-600"></div>
    </div>

    <!-- STATUS MESSAGE -->
    <div id="statusMessage" class="mt-6 hidden p-4 rounded"></div>

  </main>

  <!-- IMPORTED DATA -->
  <main class="w-full bg-white mt-6 rounded shadow p-6 mb-8">

    <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
      <h2 class="text-xl font-bold">ข้อมูลล่าสุดในระบบ</h2>
      <div class="flex gap-2 flex-wrap">
        <!-- Filter: Product Type -->
        <select id="filterProductType" onchange="loadImportData()" class="border rounded px-3 py-1.5 text-sm">
          <option value="">ทุกประเภท</option>
        </select>
        <!-- Filter: Branch -->
        <select id="filterBranch" onchange="loadImportData()" class="border rounded px-3 py-1.5 text-sm">
          <option value="">ทุกสาขา</option>
          <option>BKK</option><option>CM</option><option>CR</option><option>PL</option>
          <option>NS</option><option>KK</option><option>SK</option><option>UD</option>
          <option>UB</option><option>NR</option><option>RB</option><option>PC</option>
          <option>BS</option><option>AY</option><option>RY</option><option>CB</option>
          <option>SR</option><option>PK</option><option>HY</option><option>SB</option>
        </select>
        <!-- Search SKU -->
        <input id="filterSku" type="text" placeholder="ค้นหา SKU / ชื่อสินค้า..." 
          class="border rounded px-3 py-1.5 text-sm w-48"
          oninput="debounceSearch()" />
        <button onclick="loadImportData()" class="px-3 py-1.5 text-sm bg-gray-100 hover:bg-gray-200 rounded flex items-center gap-1">
          <i class="bi bi-arrow-clockwise"></i> รีเฟรช
        </button>
      </div>
    </div>

    <!-- Summary -->
    <div id="dataSummary" class="text-sm text-gray-500 mb-3"></div>

    <div class="table-container border rounded">
      <table class="w-full text-sm">
        <thead>
          <tr>
            <th>ประเภท</th>
            <th>SKU</th>
            <th>ชื่อสินค้า</th>
            <th>แบรนด์</th>
            <th>สาขา</th>
            <th class="text-right">ราคาตั้งต้น</th>
            <th class="text-right">ราคาหลังลด 1</th>
            <th class="text-right">ราคาหลังลด 2</th>
            <th class="text-right">ราคาหลังลด 3</th>
            <th>วันที่นำเข้า</th>
          </tr>
        </thead>
        <tbody id="importDataBody">
          <tr>
            <td colspan="11" class="text-center py-6 text-gray-400">
              <i class="bi bi-hourglass-split"></i> กำลังโหลด...
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div id="dataPagination" class="mt-4 flex items-center justify-between text-sm text-gray-600"></div>

  </main>

  <script src="excel-import.js"></script>

  <!-- TOAST CONTAINER -->
  <div id="toastContainer" class="fixed bottom-6 left-1/2 -translate-x-1/2 flex flex-col gap-2 z-50"></div>

</body>
</html>
